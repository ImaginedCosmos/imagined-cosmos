name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: scheduler-systems-web
  GCP_REGION: europe-west4
  AR_REPO: europe-west4-docker.pkg.dev/scheduler-systems-web/cosmos
  K8S_NAMESPACE: apps
  K8S_DEPLOYMENT: imagined-cosmos

jobs:
  route:
    uses: Scheduler-Systems/stratus/.github/workflows/runner-router.yml@main
    with:
      workflow_key: release.yml
    permissions:
      actions: read
      contents: read
    secrets: inherit

  build:
    name: Build & Push
    needs: route
    runs-on: ${{ needs.route.outputs.target_runner }}
    timeout-minutes: 15
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet

      - name: Build and push image
        id: meta
        run: |
          IMAGE="${AR_REPO}/imagined-cosmos:${GITHUB_SHA}"
          docker buildx build --tag "${IMAGE}" --push .
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

  rollout:
    name: Rollout to k3s
    needs: build
    runs-on: agents-medium-runc-x64
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Apply manifests (idempotent)
        run: kubectl apply -f k8s/deployment.yaml

      - name: Update deployment image
        run: |
          kubectl set image deployment/${K8S_DEPLOYMENT} \
            app=${{ needs.build.outputs.image }} \
            -n ${K8S_NAMESPACE}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${K8S_DEPLOYMENT} \
            -n ${K8S_NAMESPACE} \
            --timeout=300s

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://cosmos.scheduler-systems.com)
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (HTTP $STATUS)"
          else
            echo "::warning::Health check returned HTTP $STATUS"
          fi
