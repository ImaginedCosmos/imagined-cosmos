name: Gate
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ format('{0}-{1}-pr-{2}', github.repository, github.workflow, github.event.pull_request.number) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    needs: [runner-policy]
    if: always()
    # Keep Gate on GitHub-hosted capacity so org protection does not depend on
    # Stratus health. The runner policy job still enforces Stratus-first
    # placement for real workloads in private repos.
    runs-on: ubuntu-latest
    steps:
      - name: Enforce runner-policy result
        env:
          RUNNER_POLICY_RESULT: ${{ needs.runner-policy.result }}
        run: |
          case "$RUNNER_POLICY_RESULT" in
            success|skipped)
              echo "All required checks passed"
              ;;
            *)
              echo "runner-policy failed with result: $RUNNER_POLICY_RESULT"
              exit 1
              ;;
          esac

  runner-policy:
    if: ${{ !cancelled() }}
    uses: Scheduler-Systems/infra/.github/workflows/runner-policy-check.yml@main
    permissions:
      contents: read
    secrets: inherit
